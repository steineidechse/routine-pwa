<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon-192.png" />
  <title>Routineplan</title>

  <style>
    :root{--bg:#fafafa;--card:#fff;--muted:#666;--line:#e6e6e6;--shadow:0 8px 24px rgba(0,0,0,.08);}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:#111}
    header{position:sticky;top:0;z-index:10;background:rgba(250,250,250,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 14px;display:flex;flex-wrap:wrap;align-items:center;gap:8px}
    header h1{font-size:18px;margin:0;flex:1;min-width:150px}
    .btn{border:1px solid var(--line);background:#fff;padding:10px 12px;border-radius:14px;font-weight:600}
    .btn.primary{background:#111;color:#fff;border-color:#111}
    main{padding:14px;max-width:760px;margin:0 auto}
    .box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:var(--shadow);white-space:pre-wrap;font-family:ui-monospace,monospace}
    .err{border-color:#f99;background:#fff6f6}
  </style>
</head>

<body>
<header>
  <button id="backBtn" class="btn" style="display:none;">←</button>
  <h1 id="title">Routine auswählen</h1>

  <button id="exportBtn" class="btn" style="display:none;">Export</button>
  <button id="importBtn" class="btn" style="display:none;">Import</button>

  <button id="editBtn" class="btn" style="display:none;">Bearbeiten</button>
  <button id="resetBtn" class="btn" style="display:none;">Reset</button>
  <button id="saveBtn" class="btn primary" style="display:none;">Speichern</button>
  <button id="addBtn" class="btn" style="display:none;">+ Item</button>
</header>

<main>
  <div id="app">Wenn du das liest, hat app.js noch nicht gerendert.</div>

  <div id="debug" class="box" style="margin-top:12px;">Debug: starte…</div>
  <div id="err" class="box err" style="margin-top:12px; display:none;"></div>
</main>

<div id="sparkles"></div>

<script>
  // Service Worker (ok)
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js"));
  }
</script>

<script type="module">
  const dbg = document.getElementById("debug");
  const err = document.getElementById("err");
  const showErr = (msg) => { err.style.display="block"; err.textContent = String(msg); };

  window.addEventListener("error", (e) => showErr("JS ERROR:\n" + (e.message || e.error || e)));
  window.addEventListener("unhandledrejection", (e) => showErr("PROMISE ERROR:\n" + (e.reason?.stack || e.reason || e)));

  // Check: ist app.js erreichbar?
  try {
    const r = await fetch("./app.js", { cache: "no-store" });
    dbg.textContent =
      "Debug:\n" +
      "URL: " + location.href + "\n" +
      "fetch(./app.js): " + r.status + " " + r.statusText + "\n" +
      "content-type: " + (r.headers.get("content-type") || "(none)") + "\n";

    if (!r.ok) {
      showErr("app.js ist nicht OK erreichbar (Status " + r.status + ").");
    } else {
      // Robust: import mit Cache-Bust
      await import("./app.js?v=" + Date.now());
      dbg.textContent += "\nimport(app.js): OK";
    }
  } catch (e) {
    showErr(e?.stack || e);
  }
</script>
</body>
</html>
